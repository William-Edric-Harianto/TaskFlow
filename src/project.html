<!-- Hidden Delete Project Form -->
<form id="delete-project-form" action="project.php" method="POST" style="display:none;">
    <input type="hidden" name="delete_project" value="1">
    <input type="hidden" name="project_id" class="project-id-input">
</form>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');

    if (!projectId) {
        window.location.href = 'dashboard.html';
    }

    // Set hidden inputs
    document.querySelectorAll('.project-id-input').forEach(input => input.value = projectId);

    if (urlParams.has('error')) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.textContent = urlParams.get('error');
        errorDiv.classList.remove('hidden');
    }
    if (urlParams.has('success')) {
        const successDiv = document.getElementById('success-message');
        successDiv.textContent = urlParams.get('success');
        successDiv.classList.remove('hidden');
    }

    function escapeHtml(unsafe) {
        return (unsafe || '').toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    fetch(`project.php?id=${projectId}`)
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                window.location.href = 'dashboard.html';
                return;
            }

            const project = data.project;
            document.title = `${project.name} - TaskFlow`;
            document.getElementById('nav-project-name').textContent = project.name;
            document.getElementById('project-description').textContent = project.description;
            
            // Populate edit form
            document.getElementById('edit-project-name').value = project.name;
            document.getElementById('edit-project-desc').value = project.description;

            // Render members
            const membersContainer = document.getElementById('project-members');
            data.members.forEach(m => {
                membersContainer.innerHTML += `<span class="inline-flex items-center bg-gray-100 border border-gray-200 text-gray-700 text-xs px-2.5 py-1 rounded-full font-medium" title="${escapeHtml(m.name)}">${escapeHtml(m.username)}</span> `;
            });

            // Render Tasks
            const tasksByStatus = { todo: [], in_progress: [], done: [] };
            data.tasks.forEach(t => tasksByStatus[t.status].push(t));

            ['todo', 'in_progress', 'done'].forEach(status => {
                document.getElementById(`count-${status}`).textContent = `(${tasksByStatus[status].length})`;
                const container = document.getElementById(`tasks-${status}`);
                
                tasksByStatus[status].forEach(t => {
                    let borderClass = status === 'todo' ? 'border-gray-200' : (status === 'in_progress' ? 'border-blue-200' : 'border-green-200');
                    let extraClass = status === 'done' ? 'opacity-75 hover:opacity-100' : '';
                    let titleClass = status === 'done' ? 'line-through' : '';

                    container.innerHTML += `
                        <a href="task.html?id=${t.task_id}" class="block bg-white p-4 rounded-xl border ${borderClass} shadow-sm hover:shadow-md transition ${extraClass}">
                            <h4 class="font-bold text-gray-800 mb-1 ${titleClass}">${escapeHtml(t.name)}</h4>
                            <p class="text-sm text-gray-500 line-clamp-2">${escapeHtml(t.description)}</p>
                        </a>
                    `;
                });
            });
        })
        .catch(err => console.error(err));
</script>
