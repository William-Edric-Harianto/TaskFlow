<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <a href="dashboard.html" class="text-2xl font-bold tracking-tighter">Task<span class="text-blue-600">Flow</span></a>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-gray-700" id="nav-user-name">Memuat...</span>
                <a href="logout.php" class="text-sm text-gray-500 hover:text-red-600 transition">Keluar</a>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">Proyek Saya</h1>
        <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition">
            + Proyek Baru
        </button>
    </div>

    <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"></div>

    <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
        <!-- Projects will be loaded here -->
        <div class="col-span-full text-center py-12 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500" id="projects-loading">
            Memuat proyek...
        </div>
    </div>

    <h2 class="text-xl font-bold mb-4">Aktivitas Terakhir</h2>
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <ul id="activities-container" class="divide-y divide-gray-200">
            <!-- Activities will be loaded here -->
            <li class="p-4 text-sm text-gray-500 text-center">Memuat aktivitas...</li>
        </ul>
    </div>
</main>

<!-- Modal Create Project -->
<div id="modal" class="fixed inset-0 bg-gray-900/50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold">Buat Proyek Baru</h3>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">&times;</button>
        </div>
        <form action="dashboard.php" method="POST">
            <input type="hidden" name="create_project" value="1">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Proyek</label>
                <input type="text" name="name" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi</label>
                <textarea name="description" rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"></textarea>
            </div>
            <div class="flex justify-end gap-3">
                <button type="button" onclick="document.getElementById('modal').classList.add('hidden')" class="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg transition">Batal</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition">Simpan</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Handle error param
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.textContent = urlParams.get('error');
        errorDiv.classList.remove('hidden');
    }

    // Fetch dashboard data
    fetch('dashboard.php')
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                window.location.href = '../index.html';
                return;
            }

            // Update user info
            if (data.user) {
                document.getElementById('nav-user-name').textContent = `Halo, ${data.user.name}`;
            }

            // Render projects
            const projectsContainer = document.getElementById('projects-container');
            if (data.projects && data.projects.length > 0) {
                projectsContainer.innerHTML = '';
                data.projects.forEach(proj => {
                    const progress = proj.total_tasks > 0 ? Math.round((proj.completed_tasks / proj.total_tasks) * 100) : 0;
                    projectsContainer.innerHTML += `
                        <a href="project.html?id=${proj.project_id}" class="block bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition group">
                            <h3 class="text-xl font-bold mb-2 group-hover:text-blue-600 transition">${escapeHtml(proj.name)}</h3>
                            <p class="text-gray-500 text-sm mb-4 line-clamp-2">${escapeHtml(proj.description || '')}</p>
                            <div class="flex justify-between text-xs text-gray-400 mb-2 font-medium">
                                <span>Progress</span>
                                <span>${progress}%</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-2">
                                <div class="bg-blue-600 h-2 rounded-full" style="width: ${progress}%"></div>
                            </div>
                        </a>
                    `;
                });
            } else {
                projectsContainer.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500">
                        Belum ada proyek. Buat proyek pertamamu!
                    </div>
                `;
            }

            // Render activities
            const activitiesContainer = document.getElementById('activities-container');
            if (data.activities && data.activities.length > 0) {
                activitiesContainer.innerHTML = '';
                data.activities.forEach(act => {
                    let text = `<span class="font-medium text-gray-900">${escapeHtml(act.action)}</span>`;
                    if (act.task_name) text += ` pada tugas <span class="font-medium">"${escapeHtml(act.task_name)}"</span>`;
                    if (act.project_name) text += ` di proyek <span class="font-medium">"${escapeHtml(act.project_name)}"</span>`;
                    
                    activitiesContainer.innerHTML += `
                        <li class="p-4 hover:bg-gray-50 transition">
                            <p class="text-sm">${text}</p>
                            <p class="text-xs text-gray-400 mt-1">${act.date} ${act.time}</p>
                        </li>
                    `;
                });
            } else {
                activitiesContainer.innerHTML = `<li class="p-4 text-sm text-gray-500 text-center">Belum ada aktivitas.</li>`;
            }
        })
        .catch(err => {
            console.error('Failed to load dashboard data:', err);
            document.getElementById('projects-loading').textContent = 'Gagal memuat data.';
        });

    function escapeHtml(unsafe) {
        return (unsafe || '').toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>

</body>
</html>
